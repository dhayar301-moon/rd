<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Bus Attendance</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🚌</div>
        <h1>Smart Bus Attendance</h1>
        <p>Bus Incharge Login</p>
      </div>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          Login
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--muted);">
        Default: admin / admin123
      </p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/me').then(r => r.json()).then(d => {
      if (d.loggedIn) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alert-box');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          alertBox.innerHTML = `<div class="alert alert-success">✅ Welcome, ${data.username}! Redirecting...</div>`;
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          alertBox.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
        }
      } catch {
        alertBox.innerHTML = `<div class="alert alert-error">❌ Server not reachable. Is the backend running?</div>`;
      }
    });
  </script>
</body>
</html>
